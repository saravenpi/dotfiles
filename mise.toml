# Dotfiles-local tasks only. Machine-wide tools live in ~/.config/mise/config.toml.
[tasks.lint]
description = "Run shell and zsh startup checks"
run = [
  "shellcheck -x install.sh bash/.bashrc bash/.bash_profile bash/.bash_interactive bash/.bash_settings shell/.functions shell/.aliases shell/.variables",
  "zsh -n zsh/.zshrc zsh/.zprofile zsh/.zsh_settings zsh/.zsh_interactive",
]
