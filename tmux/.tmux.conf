# Mellow theme colors
set -g @mellow_purple "#aca1cf"      # Purple for active window
set -g @mellow_green "#90b99f"       # Green for session indicator
set -g @mellow_orange "#c4a47c"      # Orange for paused sessions
set -g @mellow_yellow "#c8d062"      # Yellow for paused sessions
set -g @mellow_blue "#7fb4ca"        # Blue for running sessions
set -g @mellow_gray "#353539"        # Gray for inactive elements
set -g @mellow_background "#161617"  # Background color
set -g @mellow_foreground "#c9c7cd"  # Foreground color

# WISP status colors using mellow theme
set -g @wisp_running_fg "#161617"
set -g @wisp_running_bg "#7fb4ca"
set -g @wisp_paused_fg "#161617"
set -g @wisp_paused_bg "#c4a47c"
set -g @wisp_completed_fg "#161617"
set -g @wisp_completed_bg "#90b99f"
set -g @wisp_inactive_fg "#c9c7cd"
set -g @wisp_inactive_bg "#353539"
set -g @left_border ""
set -g @right_border ""
set -g @session_icon ""
set -g @active_window_icon ""
set -g @inactive_window_icon ""

# set -g window-status-separator ""
set -g window-status-separator " "

# change prefix
set -g prefix C-a
bind a send-prefix

set-option -g status-position top
set -g status 1
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g default-shell /bin/zsh
set -g allow-passthrough on

# Modern tmux 3.5+ features and performance
set -g focus-events on
set -g escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g display-panes-time 800
set -g repeat-time 1000
set -g aggressive-resize on

# Better window and pane indexing
# set -g base-index 1
# set -g pane-base-index 1
# set -g renumber-windows on

# Automatic window renaming
# set -g automatic-rename on
# set -g automatic-rename-format '#{b:pane_current_path}'

# Enhanced vim-like keybindings in copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Y send-keys -X copy-line
bind-key -T copy-mode-vi _ send-keys -X start-of-line
bind-key -T copy-mode-vi A send-keys -X end-of-line
bind-key -T copy-mode-vi w send-keys -X next-word-end
bind-key -T copy-mode-vi e send-keys -X next-word
bind-key -T copy-mode-vi b send-keys -X previous-word
bind-key -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""
bind-key -T copy-mode-vi n send-keys -X search-again
bind-key -T copy-mode-vi N send-keys -X search-reverse
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Better copy mode entry
bind [ copy-mode
bind ] paste-buffer


# Enhanced session management
bind S list-sessions
bind C command-prompt -p "New session name:" "new-session -s %1"
bind X confirm-before -p "Kill session #S? (y/n)" kill-session
bind R command-prompt -I "#S" "rename-session %%"

# Enhanced window management
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -c "#{pane_current_path}"
bind r command-prompt -I "#W" "rename-window %%"
bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind X confirm-before -p "Kill window #W? (y/n)" kill-window

# Custom key bindings
bind D detach-client  # Move detach to capital D
bind d display-popup -E -w 50% -h 50% -T " Donut " -d "#{pane_current_path}" \
  'command -v donut >/dev/null 2>&1 && donut || echo "donut not found. Install with: curl -fsSL https://raw.githubusercontent.com/saravenpi/donut/main/install.sh | bash"'

# Quick popup terminal
bind t display-popup -E -w 80% -h 80% -T " Terminal " -d "#{pane_current_path}"

# # Wisp integration
# # Wisp integration now handled by plugin with w (toggle) and W (menu)
# bind w run "~/.local/bin/wisp toggle"
# bind W run "~/.local/bin/wisp-menu.sh"


# Better window management
bind n next-window
bind p previous-window
bind Tab last-window
bind Space next-layout

# Synchronize panes
bind e setw synchronize-panes

# reload tmux config with feedback
bind T source-file ~/.tmux.conf \; display-message "Config reloaded!"

# moving between panes with vim movement keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize the pane
bind-key -r J resize-pane -D 3
bind-key -r K resize-pane -U 3
bind-key -r H resize-pane -L 3
bind-key -r L resize-pane -R 3

# moving between windows with vim movement keys with fzf support
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
| grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

is_fzf="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?fzf$'"

bind -n C-h run "($is_vim && tmux send-keys C-h) || \
                          tmux select-pane -L"
bind -n C-j run "($is_vim && tmux send-keys C-j)  || \
                         ($is_fzf && tmux send-keys C-j) || \
                         tmux select-pane -D"
bind -n C-k run "($is_vim && tmux send-keys C-k) || \
                          ($is_fzf && tmux send-keys C-k)  || \
                          tmux select-pane -U"
bind -n C-l run "($is_vim && tmux send-keys C-l) || \
                          tmux select-pane -R"
bind-key -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

# tpm plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'kristijanhusak/tmux-simple-git-status'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @plugin 'saravenpi/sertren'
set -g @plugin 'saravenpi/donut'

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100

# Window tab styling - active tab uses mellow gray, inactive uses mellow purple
set -g window-status-current-style "fg=#{@mellow_foreground},bg=#{@mellow_gray}"
set -g window-status-style "fg=#{@mellow_background},bg=default"

# Window status format with proper powerline symbols and no extra spaces
set -g window-status-format "#[fg=#{@mellow_gray},bg=default]#{@left_border}#[fg=white,bg=#{@mellow_gray}] #{@inactive_window_icon} #W #[fg=#{@mellow_gray},bg=default]#{@right_border}"
set -g window-status-current-format "#[fg=#{@mellow_purple},bg=#{@mellow_background}]#{@left_border}#[fg=#{@mellow_background},bg=#{mellow_purple}] #{@active_window_icon} #W #[fg=#{@mellow_purple},bg=#{@mellow_background}]#{@right_border}"

# Status left with consistent color usage
set -g status-left "#[bg=#{@mellow_green},fg=#{@mellow_background}]  #{@session_icon} #S #[fg=#{@mellow_green},bg=default]#{@right_border} "

# Transparent Status bar background
set -g status-bg default
set -g status-style "bg=default,fg=#{@mellow_foreground}"

set -g status-interval 1

# Status bar at top: Current session windows and info (uses standard status-left, window-status, status-right)

run '~/.tmux/plugins/tpm/tpm'
