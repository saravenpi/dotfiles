# paper.tmux theme configuration
set -g @paper_theme "dark"

# change prefix
set -g prefix C-a
bind a send-prefix

set-option -g status-position top
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g default-shell /bin/zsh
set -g allow-passthrough on

set-option -g update-environment "MARCEL_TOKEN MARCEL_API_ENDPOINT"
set-environment -g MARCEL_TOKEN "$MARCEL_TOKEN"

# Modern tmux 3.5+ features and performance
set -g focus-events on
set -g escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g display-panes-time 800
set -g repeat-time 1000
set -g aggressive-resize on

# Better window and pane indexing
# set -g base-index 1
# set -g pane-base-index 1
# set -g renumber-windows on

# Enhanced vim-like keybindings in copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Y send-keys -X copy-line
bind-key -T copy-mode-vi _ send-keys -X start-of-line
bind-key -T copy-mode-vi A send-keys -X end-of-line
bind-key -T copy-mode-vi w send-keys -X next-word-end
bind-key -T copy-mode-vi e send-keys -X next-word
bind-key -T copy-mode-vi b send-keys -X previous-word
bind-key -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""
bind-key -T copy-mode-vi n send-keys -X search-again
bind-key -T copy-mode-vi N send-keys -X search-reverse
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Better copy mode entry
bind [ copy-mode
bind ] paste-buffer


# Enhanced session management
bind S list-sessions
bind C command-prompt -p "New session name:" "new-session -s %1"
bind X confirm-before -p "Kill session #S? (y/n)" kill-session
bind R command-prompt -I "#S" "rename-session %%"

# Enhanced window management
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -c "#{pane_current_path}"
bind r command-prompt -I "#W" "rename-window %%"
bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind X confirm-before -p "Kill window #W? (y/n)" kill-window

# Custom key bindings
bind D detach-client

# Marcel CLI popup
bind m display-popup -E -w 70% -h 70% -T " Marcel " -d "#{pane_current_path}" \
  'command -v marcel >/dev/null 2>&1 && exec marcel || echo "marcel not found. Install with: curl -fsSL https://raw.githubusercontent.com/marcel-org/cli/main/install.sh | bash"'

# Vero CLI popup
bind v display-popup -E -w 70% -h 70% -T " Vero " -d "#{pane_current_path}" \
  'command -v vero >/dev/null 2>&1 && exec vero || echo "vero not found. Install with: curl -fsSL https://raw.githubusercontent.com/saravenpi/vero/main/install.sh | bash"'

# Quick popup terminal
bind t display-popup -E -w 80% -h 80% -T " Terminal " -d "#{pane_current_path}"


# Better window management
bind n next-window
bind p previous-window
bind Tab last-window
bind Space next-layout

# Synchronize panes
bind e setw synchronize-panes

# reload tmux config with feedback
bind T source-file ~/.tmux.conf \; display-message "Config reloaded!"

# moving between panes with vim movement keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize the pane
bind-key -r J resize-pane -D 3
bind-key -r K resize-pane -U 3
bind-key -r H resize-pane -L 3
bind-key -r L resize-pane -R 3

# moving between windows with vim movement keys with fzf support
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
| grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

is_fzf="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?fzf$'"

bind -n C-h run "($is_vim && tmux send-keys C-h) || \
                          tmux select-pane -L"
bind -n C-j run "($is_vim && tmux send-keys C-j)  || \
                         ($is_fzf && tmux send-keys C-j) || \
                         tmux select-pane -D"
bind -n C-k run "($is_vim && tmux send-keys C-k) || \
                          ($is_fzf && tmux send-keys C-k)  || \
                          tmux select-pane -U"
bind -n C-l run "($is_vim && tmux send-keys C-l) || \
                          tmux select-pane -R"
bind-key -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

# tpm plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'saravenpi/paper.tmux'
set -g @plugin 'kristijanhusak/tmux-simple-git-status'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @plugin 'saravenpi/sertren'
set -g @plugin 'saravenpi/donut'

# Status bar configuration
set -g status-right-length 100
set -g status-left-length 100

run '~/.tmux/plugins/tpm/tpm'
